---
# ═══════════════════════════════════════════════════════════════════════
#  Observability exporters на peer'е (Phase 8).
#
#  Устанавливает на каждом узле:
#    - node_exporter         (все peers)
#    - frr_exporter          (узлы с FRR: gw, RR, member, exit)
#    - postgres_exporter     (на mgmt-eu primary и cdn standby — отдельный if)
#    - wireguard-exporter    (для AmneziaWG-метрик в node_exporter)
#
#  Слушают на 0.0.0.0 — доступны Prometheus'у с mgmt-eu через NetBird overlay.
#  Локально защищено отсутствием публичного IP (peer находится в overlay).
# ═══════════════════════════════════════════════════════════════════════

# ── 1. node_exporter (везде) ────────────────────────────────────────────

- name: Install prometheus-node-exporter (Debian/Ubuntu)
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Install prometheus-node-exporter (Fedora)
  ansible.builtin.dnf:
    name: golang-github-prometheus-node-exporter
    state: present
  when: ansible_os_family in ['RedHat', 'Fedora']

- name: Enable + start node_exporter
  ansible.builtin.service:
    name: "{{ 'prometheus-node-exporter' if ansible_os_family == 'Debian' else 'node_exporter' }}"
    state: started
    enabled: true

# ── 2. frr_exporter (на узлах с FRR) ────────────────────────────────────

- name: Download frr_exporter binary
  ansible.builtin.get_url:
    url: https://github.com/tynany/frr_exporter/releases/download/v1.5.0/frr_exporter-1.5.0.linux-amd64.tar.gz
    dest: /tmp/frr_exporter.tar.gz
    mode: '0644'
  when: fabric_role in ['site-gw', 'rr-primary', 'rr-backup', 'member', 'exit']

- name: Unpack frr_exporter
  ansible.builtin.unarchive:
    src: /tmp/frr_exporter.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: ['--strip-components=1']
    creates: /usr/local/bin/frr_exporter
  when: fabric_role in ['site-gw', 'rr-primary', 'rr-backup', 'member', 'exit']

- name: Systemd unit для frr_exporter
  ansible.builtin.copy:
    dest: /etc/systemd/system/frr_exporter.service
    mode: '0644'
    content: |
      [Unit]
      Description=FRR Prometheus Exporter
      After=network.target frr.service
      Wants=frr.service

      [Service]
      Type=simple
      User=frr
      Group=frr
      ExecStart=/usr/local/bin/frr_exporter --web.listen-address=:9342
      Restart=on-failure
      RestartSec=10s

      [Install]
      WantedBy=multi-user.target
  when: fabric_role in ['site-gw', 'rr-primary', 'rr-backup', 'member', 'exit']
  notify:
    - daemon-reload
    - restart frr_exporter

- name: Enable frr_exporter
  ansible.builtin.systemd:
    name: frr_exporter
    enabled: true
    state: started
    daemon_reload: true
  when: fabric_role in ['site-gw', 'rr-primary', 'rr-backup', 'member', 'exit']

# ── 3. postgres_exporter (на mgmt-eu primary + cdn standby) ─────────────

- name: Run postgres_exporter container (mgmt-eu / cdn)
  community.docker.docker_container:
    name: postgres-exporter
    image: prometheuscommunity/postgres-exporter:latest
    state: started
    restart_policy: unless-stopped
    network_mode: host
    env:
      DATA_SOURCE_NAME: "postgresql://postgres-exporter:{{ pg_exporter_password }}@127.0.0.1:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"
  when:
    - fabric_role in ['rr-primary', 'rr-backup']
    - inventory_hostname in ['mgmt-eu-1', 'cdn']
    - pg_exporter_password is defined
