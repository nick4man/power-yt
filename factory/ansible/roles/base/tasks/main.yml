---
# Базовые требования для любого peer фабрики:
# - IPv4/IPv6 forwarding (нужно FRR + NetBird routes)
# - NTP-sync (BGP-таймеры чувствительны к расхождению времени)
# - Базовые пакеты для диагностики (tcpdump, jq, dig)
# - Hostname == inventory_hostname (для magic-DNS NetBird и BGP router-id consistency)

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Enable IPv4 + IPv6 forwarding (persistent)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    state: present
    sysctl_file: /etc/sysctl.d/99-fabric-forward.conf
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding

- name: Disable reverse-path filter strictness (нужно для EVPN async paths)
  ansible.posix.sysctl:
    name: "net.ipv4.conf.{{ item }}.rp_filter"
    value: '2'
    state: present
    sysctl_file: /etc/sysctl.d/99-fabric-forward.conf
    reload: true
  loop:
    - all
    - default

- name: Install base packages (Debian/Ubuntu family)
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install base packages (RHEL/Fedora family)
  ansible.builtin.dnf:
    name: "{{ base_packages | reject('search', 'bind9') | list + ['bind-utils'] }}"
    state: present
  when: ansible_os_family in ['RedHat', 'Fedora']

- name: Ensure chrony is enabled + started (NTP)
  ansible.builtin.service:
    name: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
    state: started
    enabled: true

- name: Configure fabric loopback (systemd-networkd)
  ansible.builtin.copy:
    dest: /etc/systemd/network/10-fabric-loopback.network
    content: |
      # Управляется Ansible — правки руками будут стёрты.
      [Match]
      Name=lo
      [Network]
      Address={{ fabric_loopback }}/32
    mode: '0644'
  notify: restart systemd-networkd
