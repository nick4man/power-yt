---
# Exit-узел (zarubezhnaya VPS с публичным IP).
# Дополняет роль gw для fabric_role=exit:
#   - NAT44 masquerade для исходящего user-трафика
#   - анонс default-route в iBGP (приоритет — bgp_local_pref в host_vars)
#
# Phase 3 минимум: skeleton. Phase 5 (Exit-фабрика) расширит:
#   - nftables rate-limiting per peer
#   - GeoIP-блокировка опц.
#   - cloudflared/wireguard signal-fallback при DPI на UDP

- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Drop NAT44 baseline ruleset
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    mode: '0644'
    content: |
      #!/usr/sbin/nft -f
      flush ruleset

      table inet filter {
        chain input    { type filter hook input    priority 0; policy accept; }
        chain forward  { type filter hook forward  priority 0; policy accept; }
        chain output   { type filter hook output   priority 0; policy accept; }
      }

      table ip nat {
        chain prerouting  { type nat hook prerouting  priority -100; }
        chain postrouting { type nat hook postrouting priority 100;
          # MASQUERADE для трафика из фабрики (10.X.X.X) на внешний интерфейс
          ip saddr 10.0.0.0/8 oifname != "wt0" oifname != "lo" masquerade
        }
      }
  notify: restart nftables

- name: Enable + start nftables
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

- name: Apply BBR + high-throughput sysctls (anti-censorship exits ~ high RTT)
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/10-fabric-exit.conf
    reload: true
  loop:
    - { name: net.ipv4.tcp_congestion_control, value: bbr }
    - { name: net.core.default_qdisc,          value: fq }
    - { name: net.core.somaxconn,              value: '4096' }
    - { name: net.ipv4.tcp_max_syn_backlog,    value: '4096' }
    - { name: net.ipv4.tcp_fastopen,           value: '3' }
  loop_control:
    label: "{{ item.name }} = {{ item.value }}"

- name: Add bgp_local_pref outbound route-map (FRR) — анонс default с приоритетом
  ansible.builtin.copy:
    dest: /etc/frr/exit-localpref.conf
    mode: '0640'
    owner: frr
    group: frr
    content: |
      ! Управляется Ansible. local-pref на анонсе default-route.
      route-map EXIT-OUT permit 10
       set local-preference {{ bgp_local_pref }}
      !
      ! Включить в frr.conf:
      !   router bgp {{ fabric_as }}
      !    address-family ipv4 unicast
      !     neighbor <RR> route-map EXIT-OUT out
  notify: restart frr

- name: Финальный отчёт
  ansible.builtin.debug:
    msg: |
      ✓ Exit-узел готов:
        - NAT44 для 10.0.0.0/8 → внешний iface
        - BBR + fq qdisc
        - bgp_local_pref = {{ bgp_local_pref | default('unset') }}
        - Default-route 0.0.0.0/0 анонсируется через FRR (network statement)
      Phase 5 добавит rate-limiting + GeoIP-фильтр при необходимости.
