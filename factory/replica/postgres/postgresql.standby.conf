# ═══════════════════════════════════════════════════════════════════════
#  Postgres STANDBY конфиг для cdn (Phase 6).
#
#  Standby не может писать (пока не promote). Принимает stream от primary
#  и применяет WAL. После promote становится обычным primary.
# ═══════════════════════════════════════════════════════════════════════

listen_addresses = '*'
port = 5432
max_connections = 100

# Hot standby — допускаем read-only queries на standby пока он реплицирует
hot_standby = on
hot_standby_feedback = on        # primary знает про долгие запросы standby (vacuum-задержка)
max_standby_streaming_delay = 30s

# Recovery-параметры (применяются когда стоит standby.signal в data dir)
# primary_conninfo задаётся через bootstrap-standby.sh при первом pg_basebackup
# и записывается в auto.conf — здесь только хвостовые тюнинги.

# Производительность
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB
wal_compression = on

# Логирование replication-лага
log_replication_commands = on
log_min_duration_statement = 500ms
