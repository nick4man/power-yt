# Coturn TURN/STUN сервер для NetBird NAT-traversal.
# Запускается с host network — слушает напрямую на UDP/TCP 3478.
# external-ip обязателен для корректной работы за NAT (mgmt-eu обычно прямой публичный, но прописываем явно).

listening-port=3478
tls-listening-port=5349

# ВАЖНО: подставь публичный IPv4 mgmt-eu в external-ip (значение из FABRIC env).
# Без этого NetBird-клиенты будут получать локальный IP, и TURN не сработает.
external-ip=REPLACE_WITH_MGMT_PUBLIC_IP

# Authentication: long-term credential mechanism, общий с NetBird management через ShredSecret.
fingerprint
lt-cred-mech
realm=nb.example.com

# Один встроенный user — netbird management генерирует time-based credentials через ShredSecret.
# Этот static-user — fallback на ручное тестирование (turnutils_uclient).
user=netbird:REPLACE_WITH_TURN_PASSWORD

# Минимальная поверхность атаки
no-cli
no-tls
no-dtls
no-loopback-peers
no-multicast-peers
no-software-attribute

# Логирование
log-file=stdout
verbose

# Ограничения
total-quota=200
user-quota=20
bps-capacity=0
stale-nonce=600
