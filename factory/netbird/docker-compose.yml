# ═════════════════════════════════════════════════════════════════════
#  NetBird Management Stack — Phase 2 фабрики (combined-архитектура v0.71+).
#  Деплоится на mgmt-eu (зарубежная VPS), управляет membership всех peers.
#
#  АРХИТЕКТУРА v0.71 (переписано с до-0.65 топологии):
#    - netbird-server — ЕДИНЫЙ контейнер: management + signal + relay + STUN.
#      Весь backend на :80 (gRPC/WS/REST). STUN — UDP :3478 напрямую.
#    - dashboard      — статика (nginx), OIDC-настройки в dashboard.env.
#    - coturn БОЛЬШЕ НЕТ: STUN встроен, TURN заменён нативным relay (/relay WS).
#
#  IdP — ВСТРОЕННЫЙ Dex (combined-контейнер не умеет внешний IdP, netbird #5335):
#    - config.yaml server.auth.issuer → https://nb.${FABRIC_DOMAIN}/oauth2 (Dex).
#    - Юзеры NetBird — в embedded Dex; owner через setup-wizard дашборда.
#    - Keycloak factory-admin (Phase 1) — для ДРУГИХ сервисов, не для NetBird.
#
#  EDGE (factory/edge, Traefik file-provider) — отдельный стек:
#    nb.${FABRIC_DOMAIN}/management.ManagementService/  → netbird-server:80 (h2c)
#    nb.${FABRIC_DOMAIN}/signalexchange.SignalExchange/  → netbird-server:80 (h2c)
#    nb.${FABRIC_DOMAIN}/relay, /ws-proxy/*, /api, /oauth2 → netbird-server:80
#    nb.${FABRIC_DOMAIN}/ (catch-all)                     → nb-dashboard:80
#    Edge подключается к сети `netbird` (external) и ходит по именам контейнеров.
#
#  Запуск (на vdsina):
#    cp .env.example .env  &&  заполнить FABRIC_DOMAIN, MGMT_PUBLIC_IP, секреты
#    ./render.sh                       # config.yaml + dashboard.env из .tpl
#    docker compose up -d
#    docker compose logs netbird-server -f      # ждать "server started"
# ═════════════════════════════════════════════════════════════════════
services:
  netbird-server:
    image: ${NETBIRD_SERVER_IMAGE:-netbirdio/netbird-server:0.71.4}
    container_name: netbird-server
    restart: unless-stopped
    networks: [netbird]
    ports:
      - "3478:3478/udp"                  # STUN — НАПРЯМУЮ, не через edge (NAT-traversal)
    volumes:
      - netbird_data:/var/lib/netbird
      - ./config.yaml:/etc/netbird/config.yaml:ro
    command: ["--config", "/etc/netbird/config.yaml"]
    logging:
      driver: json-file
      options: {max-size: "100m", max-file: "3"}

  dashboard:
    image: ${NETBIRD_DASHBOARD_IMAGE:-netbirdio/dashboard:latest}
    container_name: nb-dashboard
    restart: unless-stopped
    networks: [netbird]
    env_file: ./dashboard.env

volumes:
  netbird_data:

networks:
  netbird:
    name: netbird
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24          # фикс подсеть → trustedHTTPProxies в config.yaml
