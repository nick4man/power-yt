global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: telegram

  routes:
    # Критичные алёрты — без group_wait (моментально)
    - matchers: [severity="critical"]
      receiver: telegram
      group_wait: 5s
      repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: '${TG_BOT_TOKEN}'
        chat_id: ${TG_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}</b>
          <i>severity: {{ .GroupLabels.severity }}</i>

          {{ range .Alerts -}}
          • <b>{{ .Labels.peer }}</b>: {{ .Annotations.summary }}
            {{ .Annotations.description }}
          {{ end -}}

inhibit_rules:
  # Если NodeDown — все остальные алёрты на этом peer заглушаются
  - source_matchers: [alertname="NodeDown"]
    target_matchers: [alertname!="NodeDown"]
    equal: [peer]
