# ═══════════════════════════════════════════════════════════════════════
#  Phase 8 — Observability stack на mgmt-eu.
#
#  Состав:
#    prometheus    — TSDB + scrape всех peers через NetBird MagicDNS
#    alertmanager  — routing alerts → Telegram bot
#    grafana       — dashboards (provisioning из ./grafana/dashboards/)
#
#  Доступ через edge на mgmt-eu (Phase 1.5):
#    grafana.${FABRIC_DOMAIN}    → :3000
#    prometheus.${FABRIC_DOMAIN} → :9090 (admin-only, желательно за SSO)
#
#  Запуск:
#    cp .env.example .env  &&  заполнить
#    docker compose up -d
# ═══════════════════════════════════════════════════════════════════════

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"               # nobody — read-only сервис
    volumes:
      - ./prometheus/:/etc/prometheus/:ro
      - prom-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.external-url=https://prometheus.example.com/
    ports:
      - "${BIND_IP:-127.0.0.1}:9090:9090"
    networks: [observability]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    environment:
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      TG_CHAT_ID: ${TG_CHAT_ID}
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=https://alertmanager.example.com/
    ports:
      - "${BIND_IP:-127.0.0.1}:9093:9093"
    networks: [observability]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel,grafana-worldmap-panel
      # Phase 7 OIDC через realm factory-admin — config в grafana.ini.snippet
      GF_AUTH_GENERIC_OAUTH_ENABLED: "false"   # включать только когда KC prod готов
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${BIND_IP:-127.0.0.1}:3000:3000"
    networks: [observability]

volumes:
  prom-data:
  alertmanager-data:
  grafana-data:

networks:
  observability:
    name: factory-observability
    driver: bridge
