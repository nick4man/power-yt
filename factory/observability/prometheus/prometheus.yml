global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    fabric: power-yt

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - alerts.yml

scrape_configs:
  # ─── self ──────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ─── node_exporter на каждом peer (через NetBird MagicDNS) ─────────
  - job_name: node
    static_configs:
      - targets:
          - mgmt-eu-1.netbird.fabric:9100
          - cdn.netbird.fabric:9100
          - office-msk-gw.netbird.fabric:9100
          - home-rzn-gw.netbird.fabric:9100
          - iot-gw.netbird.fabric:9100
          - media-host.netbird.fabric:9100
          - exit-de.netbird.fabric:9100
          - exit-nl.netbird.fabric:9100
        labels:
          fabric_layer: peer
    relabel_configs:
      - source_labels: [__address__]
        regex: (.+)\.netbird\.fabric:.*
        target_label: peer
        replacement: $1

  # ─── frr_exporter (BGP/EVPN метрики) ───────────────────────────────
  - job_name: frr
    static_configs:
      - targets:
          - mgmt-eu-1.netbird.fabric:9342
          - cdn.netbird.fabric:9342
          - office-msk-gw.netbird.fabric:9342
          - home-rzn-gw.netbird.fabric:9342
          - iot-gw.netbird.fabric:9342
          - media-host.netbird.fabric:9342
          - exit-de.netbird.fabric:9342
          - exit-nl.netbird.fabric:9342
        labels:
          fabric_layer: routing
    relabel_configs:
      - source_labels: [__address__]
        regex: (.+)\.netbird\.fabric:.*
        target_label: peer
        replacement: $1

  # ─── NetBird management metrics ────────────────────────────────────
  - job_name: netbird-mgmt
    metrics_path: /api/metrics
    static_configs:
      - targets: ["mgmt-eu-1.netbird.fabric:33073"]
        labels:
          fabric_layer: control-plane

  # ─── Keycloak (требует KC_METRICS_ENABLED=true) ────────────────────
  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["mgmt-eu-1.netbird.fabric:8080"]
        labels:
          fabric_layer: identity

  # ─── Postgres exporter (Phase 6 streaming health) ─────────────────
  - job_name: postgres
    static_configs:
      - targets:
          - mgmt-eu-1.netbird.fabric:9187     # primary
          - cdn.netbird.fabric:9187           # standby
        labels:
          fabric_layer: identity
