name: auth-ci

# Миграция auth-стека (Keycloak + oauth2-proxy, профиль core) на третью машину.
# validate — на любом push/PR; deploy — вручную (workflow_dispatch) или push в main.

on:
  push:
    branches: [main]
    paths: ['auth/**', '.github/workflows/auth-ci.yml']
  pull_request:
    paths: ['auth/**']
  workflow_dispatch: {}

jobs:
  # ── 1. Валидация compose (без секретов, на раннере) ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose (local emulation + prod override)
        working-directory: auth
        run: |
          cat > .env <<'EOF'
          KC_DB_PASSWORD=dummy
          KC_ADMIN_USER=admin
          KC_ADMIN_PASSWORD=dummy
          KC_PUBLIC_HOST=kc.lab.test
          KC_HOSTNAME_URL=http://kc.lab.test:8480
          OIDC_ISSUER_URL=http://kc.lab.test:8480/realms/media
          OAUTH2_CLIENT_ID=media-proxy
          OAUTH2_CLIENT_SECRET=dummy
          OAUTH2_COOKIE_SECRET=0123456789abcdef0123456789abcdef
          OAUTH2_ALLOWED_GROUPS=
          COOKIE_DOMAIN=.lab.test
          BIND_IP=127.0.0.1
          EOF
          docker compose --profile core --profile emulation config -q
          docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile core config -q
          rm -f .env
          echo "✓ compose валиден (emulation + prod)"

  # ── 2. Деплой core на третью машину по SSH ──
  deploy:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production       # включите required reviewers в настройках окружения
    env:
      SSHP: ${{ secrets.THIRD_SSH_PORT || '22' }}
      DEST: ${{ secrets.THIRD_USER }}@${{ secrets.THIRD_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.THIRD_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSHP" "${{ secrets.THIRD_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync auth/ → third machine (без локальных артефактов)
        run: |
          rsync -az --delete \
            --exclude 'data/' --exclude '.env' --exclude '*.sh' \
            --exclude 'traefik-edge/' --exclude '.env.example' \
            -e "ssh -i ~/.ssh/id_deploy -p $SSHP" \
            auth/ "$DEST:~/auth/"

      - name: Write prod .env from secrets
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSHP" "$DEST" 'umask 077; cat > ~/auth/.env' <<EOF
          KC_DB_PASSWORD=${{ secrets.KC_DB_PASSWORD }}
          KC_ADMIN_USER=${{ secrets.KC_ADMIN_USER }}
          KC_ADMIN_PASSWORD=${{ secrets.KC_ADMIN_PASSWORD }}
          KC_PUBLIC_HOST=login.${{ secrets.FABRIC_DOMAIN }}
          KC_HOSTNAME_URL=https://login.${{ secrets.FABRIC_DOMAIN }}
          OIDC_ISSUER_URL=https://login.${{ secrets.FABRIC_DOMAIN }}/realms/factory-admin
          OAUTH2_CLIENT_ID=${{ secrets.OAUTH2_CLIENT_ID }}
          OAUTH2_CLIENT_SECRET=${{ secrets.OAUTH2_CLIENT_SECRET }}
          OAUTH2_COOKIE_SECRET=${{ secrets.OAUTH2_COOKIE_SECRET }}
          OAUTH2_ALLOWED_GROUPS=${{ secrets.OAUTH2_ALLOWED_GROUPS }}
          COOKIE_DOMAIN=.${{ secrets.FABRIC_DOMAIN }}
          BIND_IP=${{ secrets.THIRD_WG_IP }}
          PG_REPLICATION_PASSWORD=${{ secrets.PG_REPLICATION_PASSWORD }}
          STANDBY_NETWORK=${{ secrets.STANDBY_NETWORK }}
          EOF

      - name: Render pg_hba.conf from template (envsubst STANDBY_NETWORK)
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSHP" "$DEST" '
            set -e
            cd ~/auth
            # Postgres data volume init копирует pg_hba.conf только при пустом dir.
            # Если контейнер уже инициализирован — нужно явно подменить файл и reload.
            STANDBY_NETWORK="${{ secrets.STANDBY_NETWORK }}" envsubst \
              < postgres/pg_hba.primary.conf > /tmp/pg_hba.rendered
            docker cp /tmp/pg_hba.rendered keycloak-db:/var/lib/postgresql/data/pg_hba.conf || true
            docker exec keycloak-db chown postgres:postgres /var/lib/postgresql/data/pg_hba.conf || true
            docker exec keycloak-db psql -U keycloak -d postgres -c "SELECT pg_reload_conf();" || true
            rm /tmp/pg_hba.rendered'

      - name: Deploy core profile
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSHP" "$DEST" '
            cd ~/auth &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile core pull &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile core up -d --remove-orphans'

      - name: Smoke test — Keycloak realms + oauth2-proxy OIDC discovery
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSHP" "$DEST" '
            set -e
            cd ~/auth
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile core ps

            echo "==> 1/3 Keycloak HTTP health"
            for i in $(seq 1 30); do
              docker exec keycloak curl -fsS http://localhost:8080/health/ready >/dev/null 2>&1 && break || sleep 5
            done
            docker exec keycloak curl -fsS http://localhost:8080/health/ready >/dev/null
            echo "   ✓ Keycloak ready"

            echo "==> 2/3 realms factory-admin + family импортированы"
            for r in factory-admin family; do
              docker exec keycloak curl -fsS \
                "http://localhost:8080/realms/$r/.well-known/openid-configuration" \
                | grep -q "\"issuer\":\"https://login.${{ secrets.FABRIC_DOMAIN }}/realms/$r\""
              echo "   ✓ realm $r"
            done

            echo "==> 3/3 oauth2-proxy OIDC discovery"
            for i in $(seq 1 20); do
              docker logs oauth2-proxy 2>&1 | grep -q "OAuthProxy configured" && {
                echo "   ✓ oauth2-proxy сконфигурирован"
                exit 0
              }
              sleep 5
            done
            echo "   ✗ oauth2-proxy не поднялся:"
            docker logs oauth2-proxy 2>&1 | tail -20
            exit 1'
