# Drop-in: Docker стартует ПОСЛЕ попытки смонтировать /data, чтобы контейнеры
# не поднялись с пустым /data. ТОЛЬКО After= (без Requires=!) — если media-NFS
# недоступен, Docker всё равно стартует и не утянет за собой Nextcloud.
# Установка:
#   sudo mkdir -p /etc/systemd/system/docker.service.d
#   sudo cp systemd/docker-after-storage.conf /etc/systemd/system/docker.service.d/10-after-storage.conf
#   sudo systemctl daemon-reload
[Unit]
After=mnt-storage-data.mount
