# ═════════════════════════════════════════════════════════════════════
#  Прод-оверрайд для MGMT-узла фабрики (mgmt-eu в Phase 1).
#  Поверх docker-compose.yml; применяется с профилем core.
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile core up -d
#
#  Отличия от локального стенда:
#    - Keycloak: start (strict hostname), health включён, --import-realm
#    - Realms factory-admin + family бутстрапятся из ./realms/*.json
#    - oauth2-proxy: secure-cookie (за HTTPS на edge)
#    - Порты публикуются на ${BIND_IP}:
#         0.0.0.0          — если edge (caddy/traefik/CF Tunnel) на той же VPS
#         <WG>/<NetBird>   — если доступ через overlay-туннель (после Phase 2)
#         <public IP>      — если KC прямо наружу (требует KC_HTTPS_*, не рекомендуется)
#
#  Edge для mgmt-eu (Phase 1.5, вне этого compose):
#    - Cloudflare Tunnel (cloudflared) с DNS-01 — самый простой путь под CF DNS
#    - Caddy с DNS-01 через cloudflare-plugin — если нужен свой edge
#    - Traefik с теми же DNS-01 параметрами (как на cdn-VDS) — единая технология
#
#  Значения — из .env (на CI генерируется из GitHub Secrets).
# ═════════════════════════════════════════════════════════════════════
services:
  keycloak-db:
    # Phase 6: Postgres как streaming replication PRIMARY.
    # PG_HBA с шаблоном ${STANDBY_NETWORK} раскрывается в pg_hba.primary.conf через envsubst
    # (Postgres не делает env-expansion в pg_hba.conf — это делается на entrypoint).
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/var/lib/postgresql/data/pg_hba.conf
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      POSTGRES_REPLICATION_PASSWORD: ${PG_REPLICATION_PASSWORD}
      STANDBY_NETWORK: ${STANDBY_NETWORK:-127.0.0.1/32}
    volumes:
      - ./postgres/postgresql.primary.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.primary.conf:/etc/postgresql/pg_hba.conf.tpl:ro
      - ./postgres/01-replication-user.sh:/docker-entrypoint-initdb.d/01-replication-user.sh:ro
    ports:
      - "${BIND_IP}:5432:5432"               # standby (cdn) ходит сюда через overlay

  keycloak:
    command: ["start", "--import-realm"]     # idempotent bootstrap realms из ./realms/*.json
    environment:
      KC_HOSTNAME: ${KC_HOSTNAME_URL}        # https://login.example.com
      KC_HOSTNAME_STRICT: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./realms:/opt/keycloak/data/import:ro
    # NB: НЕ публикуем :8080 на хост — edge/Traefik ходит на keycloak:8080 через
    # docker-сеть (auth_edge), published-порт не нужен. На mgmt-узле за sing-box
    # порт :8080 занят shadowsocks-inbound туннеля (listen "::":8080) — публикация
    # KC на хост вызывала bind-конфликт и crash-loop sing-box. Доступ к KC —
    # только через edge (HTTPS) или `docker exec`.

  oauth2-proxy:
    environment:
      OAUTH2_PROXY_COOKIE_SECURE: "true"     # за HTTPS на edge
    ports:
      - "${BIND_IP}:4180:4180"               # forwardAuth-цель для edge-Traefik (cdn или mgmt-edge)
