# ═══════════════════════════════════════════════════════════════════════
#  Postgres PRIMARY конфиг для mgmt-eu (Phase 6: streaming replication → cdn).
#  Монтируется как /etc/postgresql/postgresql.conf через docker-compose.prod.yml.
# ═══════════════════════════════════════════════════════════════════════

# Сеть
listen_addresses = '*'
port = 5432
max_connections = 100

# Streaming replication
wal_level = replica
max_wal_senders = 5          # сколько standby могут одновременно стримить
max_replication_slots = 5    # slot-per-standby (KEYCLOAK + резерв)
wal_keep_size = 1024MB       # держим WAL для recovery если standby отстал
hot_standby = on             # стандарт-best-practice

# WAL durability (для KC реплики важна целостность миграций)
wal_compression = on
synchronous_commit = on
fsync = on

# Логирование (для дебага replication-лагов)
log_replication_commands = on
log_min_duration_statement = 500ms

# Производительность (для small VPS — mgmt-eu CX22 2GB)
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB
