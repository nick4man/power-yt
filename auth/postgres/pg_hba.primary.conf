# ═══════════════════════════════════════════════════════════════════════
#  pg_hba PRIMARY (Phase 6).
#  Порядок строк критичен: правила оцениваются сверху вниз, первое подошедшее
#  применяется.
#
#  STANDBY_NETWORK — это сеть, из которой standby (cdn) подключается:
#    - WG-overlay (когда NetBird поднят между mgmt-eu и cdn)  → 10.X.X.X/32
#    - временно публично                                       → cdn_public_ip/32
#  Запрещено '0.0.0.0/0' — это раскрытая replication.
# ═══════════════════════════════════════════════════════════════════════

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local — для встроенных pg_ctl и init
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Application — Keycloak ↔ DB внутри docker network
host    keycloak        keycloak        172.16.0.0/12           scram-sha-256

# Replication — ТОЛЬКО replicator user из STANDBY_NETWORK
host    replication     replicator      ${STANDBY_NETWORK}      scram-sha-256

# Запрещаем всё остальное (явно — postgres deny-by-default, но для документации)
