# ─────────────────────────────────────────────────────────────────────────
#  Traefik (VDS): подключение Keycloak + oauth2-proxy (forward-auth).
#  Положить в /config на VDS ПОСЛЕ запуска auth-стека на третьей машине.
#  Заменить <THIRD_WG> на WG-адрес третьей машины (где крутятся keycloak/oauth2-proxy).
#
#  Порядок включения:
#   1) auth-стек запущен, realm `media` + client `media-proxy` созданы (см. README).
#   2) DNS: login.example.com → белый IP VDS.
#   3) Залить этот файл; убедиться, что login.example.com открывает Keycloak.
#   4) В traefik-media.example.com.yml заменить у admin-роутеров
#      middlewares: [basic-auth@file]  →  middlewares: [media-forward-auth@file]
#      (и добавить /oauth2-роутеры для поддоменных admin-приложений — см. ниже).
# ─────────────────────────────────────────────────────────────────────────
http:
  services:
    media-keycloak: { loadBalancer: { servers: [{ url: "http://<THIRD_WG>:8080" }] } }
    media-oauth2:    { loadBalancer: { servers: [{ url: "http://<THIRD_WG>:4180" }] } }

  middlewares:
    media-forward-auth:
      forwardAuth:
        address: "http://<THIRD_WG>:4180/oauth2/auth"
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - X-Auth-Request-Access-Token

  routers:
    # Keycloak (публичная морда логина)
    media-keycloak:
      rule: "Host(`login.example.com`)"
      service: media-keycloak
      entryPoints: [websecure]
      tls: { certResolver: cloudflare }

    # /oauth2/* (sign_in, callback, auth) → oauth2-proxy. По одному на каждый защищаемый ХОСТ.
    # media.example.com покрывает все path-арр (/sonarr…/bazarr) одним роутером:
    oauth2-media:
      rule: "Host(`media.example.com`) && PathPrefix(`/oauth2/`)"
      service: media-oauth2
      entryPoints: [websecure]
      priority: 100
      tls: { certResolver: cloudflare }
    # для поддоменных admin-приложений — свой /oauth2 на каждый хост:
    oauth2-qb:
      rule: "Host(`qb.media.example.com`) && PathPrefix(`/oauth2/`)"
      service: media-oauth2
      entryPoints: [websecure]
      priority: 100
      tls: { certResolver: cloudflare }
    oauth2-cleanuparr:
      rule: "Host(`cleanuparr.media.example.com`) && PathPrefix(`/oauth2/`)"
      service: media-oauth2
      entryPoints: [websecure]
      priority: 100
      tls: { certResolver: cloudflare }
    oauth2-jellystat:
      rule: "Host(`jellystat.media.example.com`) && PathPrefix(`/oauth2/`)"
      service: media-oauth2
      entryPoints: [websecure]
      priority: 100
      tls: { certResolver: cloudflare }
    oauth2-tdarr:
      rule: "Host(`tdarr.media.example.com`) && PathPrefix(`/oauth2/`)"
      service: media-oauth2
      entryPoints: [websecure]
      priority: 100
      tls: { certResolver: cloudflare }
